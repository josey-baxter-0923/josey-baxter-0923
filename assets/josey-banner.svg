<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#082F49"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1280 120) rotate(132) scale(520 420)">
      <stop stop-color="#38BDF8" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 410) rotate(-28) scale(500 340)">
      <stop stop-color="#14B8A6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
    <style>
      .title { font: 800 76px Inter, Segoe UI, Arial, sans-serif; fill: #F8FAFC; letter-spacing: -1px; }
      .role { font: 600 30px Inter, Segoe UI, Arial, sans-serif; fill: #38BDF8; }
      .sub { font: 500 24px Inter, Segoe UI, Arial, sans-serif; fill: #CBD5E1; }
      .tag { font: 700 18px Inter, Segoe UI, Arial, sans-serif; fill: #E0F2FE; }
      .code { font: 500 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #94A3B8; }
      .float { animation: float 6s ease-in-out infinite; }
      .float2 { animation: float 7.5s ease-in-out infinite reverse; }
      .pulse { animation: pulse 3.2s ease-in-out infinite; }
      .dash { stroke-dasharray: 12 16; animation: dash 22s linear infinite; }
      @keyframes float { 0%,100%{ transform: translateY(0px);} 50%{ transform: translateY(-18px);} }
      @keyframes pulse { 0%,100%{ opacity:.42;} 50%{ opacity:1;} }
      @keyframes dash { to { stroke-dashoffset: -420; } }
    </style>
  </defs>

  <rect width="1600" height="520" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="520" rx="36" fill="url(#glow1)"/>
  <rect width="1600" height="520" rx="36" fill="url(#glow2)"/>

  <g opacity="0.18">
    <path class="dash" d="M80 110 H1510 M80 210 H1510 M80 310 H1510 M80 410 H1510" stroke="#94A3B8" stroke-width="1"/>
    <path class="dash" d="M170 40 V480 M360 40 V480 M550 40 V480 M740 40 V480 M930 40 V480 M1120 40 V480 M1310 40 V480" stroke="#94A3B8" stroke-width="1"/>
  </g>

  <g class="float" opacity="0.9">
    <rect x="1040" y="105" width="385" height="250" rx="24" fill="#020617" fill-opacity="0.72" stroke="#38BDF8" stroke-opacity="0.35"/>
    <circle cx="1076" cy="137" r="7" fill="#EF4444"/>
    <circle cx="1100" cy="137" r="7" fill="#F59E0B"/>
    <circle cx="1124" cy="137" r="7" fill="#22C55E"/>
    <text x="1070" y="185" class="code">const engineer = {</text>
    <text x="1095" y="220" class="code">stack: "SaaS + AI",</text>
    <text x="1095" y="255" class="code">cloud: "AWS",</text>
    <text x="1095" y="290" class="code">focus: "Product"</text>
    <text x="1070" y="325" class="code">}</text>
  </g>

  <g class="float2" opacity="0.85">
    <circle cx="1385" cy="390" r="50" fill="#38BDF8" fill-opacity="0.12" stroke="#38BDF8" stroke-opacity="0.55"/>
    <circle cx="1385" cy="390" r="7" fill="#38BDF8"/>
    <circle cx="1326" cy="350" r="6" fill="#14B8A6"/>
    <circle cx="1452" cy="342" r="6" fill="#A78BFA"/>
    <circle cx="1440" cy="445" r="6" fill="#22C55E"/>
    <path d="M1385 390 L1326 350 M1385 390 L1452 342 M1385 390 L1440 445" stroke="#38BDF8" stroke-opacity="0.5"/>
  </g>

  <g transform="translate(110 130)">
    <text class="role" x="0" y="0">SaaS • Generative AI • Cloud</text>
    <text class="title" x="0" y="88">Josey Baxter</text>
    <text class="sub" x="0" y="137">Senior Software Engineer building production-ready AI product experiences</text>

    <g transform="translate(0 188)">
      <rect width="148" height="44" rx="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text class="tag" x="30" y="29">React</text>
      <rect x="166" width="150" height="44" rx="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text class="tag" x="197" y="29">Next.js</text>
      <rect x="334" width="146" height="44" rx="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text class="tag" x="370" y="29">Node.js</text>
      <rect x="498" width="142" height="44" rx="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text class="tag" x="532" y="29">Python</text>
      <rect x="658" width="118" height="44" rx="22" fill="#0EA5E9" fill-opacity="0.18" stroke="#38BDF8" stroke-opacity="0.5"/>
      <text class="tag" x="697" y="29">AWS</text>
    </g>
  </g>

  <circle class="pulse" cx="95" cy="88" r="5" fill="#38BDF8"/>
  <circle class="pulse" cx="1510" cy="80" r="5" fill="#14B8A6"/>
  <circle class="pulse" cx="1480" cy="470" r="5" fill="#A78BFA"/>
</svg>
