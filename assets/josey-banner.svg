<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>

    <filter id="blur"><feGaussianBlur stdDeviation="36"/></filter>
    <filter id="softShadow"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/></filter>

    <style>
      .title {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 72px;
        font-weight: 800;
        fill: #ffffff;
        letter-spacing: -2px;
      }
      .subtitle {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 28px;
        font-weight: 600;
        fill: #bfdbfe;
      }
      .tag {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #e0f2fe;
      }
      .small {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        font-weight: 500;
        fill: #94a3b8;
      }
      .node { fill: #38bdf8; opacity: 0.9; }
      .node-purple { fill: #a78bfa; opacity: 0.9; }
      .line { stroke: #38bdf8; stroke-width: 1.25; opacity: 0.38; }
      .line-purple { stroke: #a78bfa; stroke-width: 1.25; opacity: 0.32; }
      .float-slow { animation: floatSlow 7s ease-in-out infinite alternate; }
      .float-med { animation: floatMed 5s ease-in-out infinite alternate; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; }
      .fade-in { animation: fadeIn 1.4s ease-out both; }
      .slide-up { animation: slideUp 1.1s ease-out both; }
      .blink { animation: blink 1.1s steps(2, start) infinite; }
      .dash { stroke-dasharray: 7 10; animation: dashMove 10s linear infinite; }

      @keyframes floatSlow { from { transform: translateY(-8px) translateX(0); } to { transform: translateY(12px) translateX(12px); } }
      @keyframes floatMed { from { transform: translateY(8px) translateX(0); } to { transform: translateY(-14px) translateX(-10px); } }
      @keyframes pulse { 0%, 100% { opacity: 0.45; r: 4; } 50% { opacity: 1; r: 7; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes slideUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes blink { 0%, 45% { opacity: 1; } 46%, 100% { opacity: 0; } }
      @keyframes dashMove { to { stroke-dashoffset: -220; } }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>

  <circle class="float-slow" cx="970" cy="88" r="180" fill="url(#glow1)" filter="url(#blur)"/>
  <circle class="float-med" cx="890" cy="310" r="210" fill="url(#glow2)" filter="url(#blur)"/>
  <circle class="float-slow" cx="230" cy="330" r="150" fill="url(#glow1)" filter="url(#blur)" opacity="0.45"/>

  <g opacity="0.22">
    <path d="M0 340 C220 270, 320 410, 530 320 C730 234, 890 250, 1200 160" stroke="#60a5fa" stroke-width="1.5" fill="none"/>
    <path d="M0 290 C240 220, 340 360, 560 270 C760 184, 920 200, 1200 105" stroke="#a78bfa" stroke-width="1.2" fill="none"/>
  </g>

  <g class="fade-in" opacity="0.92">
    <line class="line dash" x1="790" y1="110" x2="900" y2="80"/>
    <line class="line-purple dash" x1="900" y1="80" x2="1010" y2="145"/>
    <line class="line dash" x1="1010" y1="145" x2="1095" y2="95"/>
    <line class="line-purple dash" x1="835" y1="225" x2="955" y2="190"/>
    <line class="line dash" x1="955" y1="190" x2="1075" y2="260"/>
    <line class="line-purple dash" x1="790" y1="110" x2="835" y2="225"/>
    <line class="line dash" x1="1010" y1="145" x2="955" y2="190"/>
    <line class="line-purple dash" x1="1095" y1="95" x2="1075" y2="260"/>

    <circle class="node pulse" cx="790" cy="110" r="5"/>
    <circle class="node-purple pulse" cx="900" cy="80" r="5" style="animation-delay:.3s"/>
    <circle class="node pulse" cx="1010" cy="145" r="5" style="animation-delay:.6s"/>
    <circle class="node-purple pulse" cx="1095" cy="95" r="5" style="animation-delay:.9s"/>
    <circle class="node pulse" cx="835" cy="225" r="5" style="animation-delay:1.2s"/>
    <circle class="node-purple pulse" cx="955" cy="190" r="5" style="animation-delay:1.5s"/>
    <circle class="node pulse" cx="1075" cy="260" r="5" style="animation-delay:1.8s"/>
  </g>

  <g class="slide-up" filter="url(#softShadow)">
    <text x="72" y="132" class="title">Josey Baxter</text>
    <text x="76" y="180" class="subtitle">Senior Software Engineer</text>

    <rect x="76" y="218" width="128" height="38" rx="19" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="102" y="243" class="tag">SaaS</text>

    <rect x="220" y="218" width="178" height="38" rx="19" fill="#0f172a" stroke="#60a5fa" stroke-opacity="0.45"/>
    <text x="246" y="243" class="tag">Full Stack</text>

    <rect x="414" y="218" width="194" height="38" rx="19" fill="#0f172a" stroke="#a78bfa" stroke-opacity="0.45"/>
    <text x="441" y="243" class="tag">AI Products</text>

    <rect x="624" y="218" width="156" height="38" rx="19" fill="#0f172a" stroke="#38bdf8" stroke-opacity="0.45"/>
    <text x="651" y="243" class="tag">Cloud</text>

    <text x="78" y="304" class="small">Building scalable platforms, AI-powered workflows, and production-grade cloud systems.</text>
    <text x="78" y="340" class="small">React • Next.js • Node.js • Python • AWS • Docker • Kubernetes • LLMs</text>

    <text x="78" y="374" class="small">$</text>
    <text x="94" y="374" class="small">shipping production software</text>
    <rect class="blink" x="306" y="359" width="9" height="20" rx="2" fill="#38bdf8"/>
  </g>
</svg>
